<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>type</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a1a1a;
        --text: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: Helvetica, Arial, sans-serif;
        overflow: hidden;
      }

      main {
        min-height: 100vh;
        padding: 1rem;
      }

      .capture {
        display: block;
        width: 100%;
        min-height: calc(100vh - 2rem);
        margin: 0;
        border: 0;
        padding: 0;
        resize: none;
        background: transparent;
        color: var(--text);
        caret-color: var(--text);
        font-size: clamp(0.875rem, 2vw, 1.125rem);
        font-weight: 400;
        letter-spacing: 0.04em;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: inherit;
        outline: none;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <main>
      <textarea class="capture" id="capture" autofocus spellcheck="false"></textarea>
    </main>
    <script>
      const capture = document.getElementById("capture");

      function fitHeight() {
        capture.style.height = "auto";
        capture.style.height = `${Math.max(
          capture.scrollHeight,
          window.innerHeight - 32
        )}px`;
      }

      fitHeight();
      capture.addEventListener("input", fitHeight);
      window.addEventListener("resize", fitHeight);
      window.addEventListener("click", () => capture.focus());
      window.addEventListener("load", () => capture.focus());
    </script>
  </body>
</html>
