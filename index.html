<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hello world</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a1a1a;
        --text: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: Helvetica, Arial, sans-serif;
      }

      main {
        min-height: 100vh;
        padding: 1rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(0.875rem, 2vw, 1.125rem);
        font-weight: 400;
        letter-spacing: 0.04em;
        text-transform: lowercase;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>hello world</h1>
    </main>
  </body>
</html>
